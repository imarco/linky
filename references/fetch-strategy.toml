# fetch-strategy.toml — 网页内容采集策略
#
# 此文件定义了 link-researcher 的内容提取降级链、域名路由和工具配置。
# 用户副本位于 ~/.config/linky/fetch-strategy.toml
# 随着采集经验积累可随时修改，也可同步回仓库作为社区默认值。
#
# 更新日志：
# 2026-03-26  新增 Scrapling + html2text 层；新增域名快捷路由

# ── 全局参数 ──────────────────────────────────────────

[global]
# 所有提取方式统一截断字符数，平衡正文完整性与 token 消耗
max_chars = 30000

# 单个链接最大重试次数（跨层级累计）
max_retries = 1

# 某一层超时秒数（超时则跳到下一层）
timeout_seconds = 15

# 抽取结果低于此质量分时继续 fallback
quality_threshold = 0.55

[quality]
min_score = 0.55
notes = "低于阈值的成功响应会被视为低质量并继续 fallback"

[trace]
enabled = true
output_dir = ".linky/runs"
notes = "每条 URL 记录 provider 尝试、耗时、失败原因、最终来源和质量分"

[research_loop]
enabled = true
max_iterations = 2
max_followup_links = 5
notes = "autoresearch loop: plan -> extract/analyze -> critique -> gap detection -> optional补采 -> final synthesis"

[graph]
enabled = true
format = "json"
node_types = ["url", "document", "entity", "topic", "claim", "action"]
edge_types = ["mentions", "relates_to", "supports", "cites", "follow_up", "same_domain"]

# ── 降级链 ────────────────────────────────────────────
# 按数组顺序依次尝试，前一层成功则停止
# 可选 id: "jina" | "trafilatura" | "scrapling" | "webfetch" | "browser" | "computer-use"

[[fallback_chain]]
id = "jina"
name = "Jina Reader"
method = "webfetch"                     # 通过 WebFetch 调用 Jina
url_pattern = "https://r.jina.ai/{url}" # {url} 会被替换为原始链接
daily_limit = 200                       # 免费额度
best_for = "大部分英文博客、Substack、Medium、公开技术文档"
notes = "质量最高，返回干净 Markdown，但有每日限额"

[[fallback_chain]]
id = "trafilatura"
name = "Trafilatura"
method = "python"
daily_limit = 0
best_for = "公开文章、博客、新闻站、普通文档页"
notes = "轻量正文和 metadata 抽取层，放在 Scrapling 前面，失败或低质量时继续 fallback"
requires = ["trafilatura"]

[[fallback_chain]]
id = "scrapling"
name = "Scrapling + html2text"
method = "bash"                         # 通过 Bash 调用 Python 脚本
command = "python3 {skill_dir}/scripts/scrapling_fetch.py {url} {max_chars}"
daily_limit = 0                         # 无限制
best_for = "Jina 超限后的通用替代、微信公众号、动态公开页面"
notes = "用于公开正文抽取和页面结构解析。必须用 html2text 转 Markdown"
requires = ["scrapling", "html2text"]   # pip 依赖

[[fallback_chain]]
id = "webfetch"
name = "WebFetch 直接抓取"
method = "webfetch"                     # 直接 WebFetch 原始 URL
url_pattern = "{url}"
daily_limit = 0
best_for = "静态页面、GitHub README、普通技术博客、官方文档"
notes = "返回全页内容，含导航栏/侧边栏等噪音，token 浪费较多"

[[fallback_chain]]
id = "browser"
name = "Playwright CLI 浏览器自动化"
method = "bash"                         # 通过 Bash 调用 playwright-cli（不再走 MCP）
command = "playwright-cli open {url} && playwright-cli snapshot"
daily_limit = 0
best_for = "用户本人浏览器中可见的动态渲染页面"
notes = "比 MCP 省 ~4x token（不加载 accessibility tree 到 context）。需要 npm install -g @playwright/cli"
requires = ["playwright-cli"]           # npm 全局依赖
# 常用 playwright-cli 子命令参考：
#   playwright-cli open <url>           打开页面
#   playwright-cli open <url> --headed  可视化打开
#   playwright-cli snapshot             获取页面快照（类似 accessibility tree，但更精简）
#   playwright-cli eval "JS表达式"      在页面上执行 JS
#   playwright-cli screenshot           截图
#   playwright-cli click <target>       点击元素
#   playwright-cli fill <target> <text> 填写输入框
#   playwright-cli type <text>          输入文本
#   playwright-cli --persistent         跨调用保持本地浏览器上下文

# ── 专用 Provider 配置────────────────────────────────
# 这些 provider 不进入通用 fallback_chain，只通过 domain_routes 定向启用。

[providers.vxtwitter]
name = "vxTwitter / FixTweet JSON API"
method = "json-api"
api_pattern = "https://api.fxtwitter.com/status/{tweet_id}"
id_only_api_pattern = "https://api.fxtwitter.com/status/{tweet_id}"
best_for = "公开 X/Twitter status URL、带媒体的 tweet、部分 X Article payload"
notes = "第三方抓取服务；FixTweet status endpoint 对 X Article content.blocks 更完整，失败时必须继续 fallback；不保证投票、私密内容或全部长文类型稳定可用"

[providers.youtube_ytdlp]
name = "YouTube yt-dlp"
method = "command-json"
role = "transcript"
command = "yt-dlp --dump-single-json --skip-download --write-auto-subs --sub-lang {sub_lang} {url}"
best_for = "YouTube metadata, captions, subtitles, and transcript extraction"
notes = "Requires yt-dlp plus node or deno for current YouTube extraction paths"
requires = ["yt-dlp", "node-or-deno"]

[providers.github_gh]
name = "GitHub gh CLI"
method = "command-json"
role = "structured-url-reader"
best_for = "GitHub repositories, issues, pull requests, releases, and code search"
requires = ["gh"]

[providers.rss_feedparser]
name = "RSS feedparser"
method = "python"
role = "feed"
best_for = "RSS and Atom feeds"
requires = ["feedparser"]

[providers.exa_search]
name = "Exa Search via mcporter"
method = "mcp-command"
role = "search-only"
best_for = "Research follow-up search and code context lookup"
requires = ["mcporter", "exa-mcp-config"]

[providers.v2ex_api]
name = "V2EX public API"
method = "json-api"
role = "structured-url-reader"
best_for = "V2EX topics, nodes, replies, and users"
requires = []

[providers.bilibili_cli]
name = "Bilibili bili-cli"
method = "command-json"
role = "structured-url-reader"
best_for = "Bilibili search, hot/ranking, and video detail"
requires = ["bili"]

[providers.opencli_bilibili]
name = "OpenCLI Bilibili"
method = "command-yaml"
role = "user-visible-session"
best_for = "Bilibili subtitles through browser session"
requires = ["opencli"]

[providers.twitter_cli]
name = "twitter-cli"
method = "command-json"
role = "user-visible-session"
best_for = "X/Twitter search, timeline, articles, and threads"
requires = ["twitter"]

[providers.opencli_twitter]
name = "OpenCLI Twitter"
method = "command-yaml"
role = "user-visible-session"
best_for = "Twitter through user's Chrome session"
requires = ["opencli"]

[providers.opencli_reddit]
name = "OpenCLI Reddit"
method = "command-yaml"
role = "user-visible-session"
best_for = "Reddit search, posts, comments through browser session"
requires = ["opencli"]

[providers.rdt_cli]
name = "rdt-cli"
method = "command-json"
role = "user-visible-session"
best_for = "Reddit search and post reading with imported saved sessions"
requires = ["rdt"]

[providers.opencli_xhs]
name = "OpenCLI XiaoHongShu"
method = "command-yaml"
role = "user-visible-session"
best_for = "XiaoHongShu desktop reading through Chrome session"
requires = ["opencli"]

[providers.xiaohongshu_mcp]
name = "xiaohongshu-mcp"
method = "mcp-command"
role = "user-visible-session"
best_for = "XiaoHongShu server/headless reading after QR login"
requires = ["mcporter", "xiaohongshu-mcp-service"]

[providers.xhs_cli]
name = "xhs-cli legacy"
method = "command-json"
role = "user-visible-session"
best_for = "Existing xhs-cli installs only"
requires = ["xhs"]

[providers.linkedin_mcp]
name = "LinkedIn MCP"
method = "mcp-command"
role = "user-visible-session"
best_for = "LinkedIn profile, company, and job search"
requires = ["mcporter", "linkedin-mcp-config"]

[providers.xueqiu_api]
name = "Xueqiu API"
method = "json-api"
role = "user-visible-session"
best_for = "Xueqiu stock quotes, search, hot posts, and hot stocks"
requires = ["xueqiu-session"]

[providers.xiaoyuzhou_transcript]
name = "Xiaoyuzhou transcript"
method = "command-transcript"
role = "transcript"
best_for = "Xiaoyuzhou podcast audio transcription"
requires = ["ffmpeg", "transcription-provider"]

# ── 域名快捷路由 ──────────────────────────────────────
# 命中的域名直接跳到指定方案，不走标准降级链
# skip_layers: 跳过这些层（节省配额或避免已知失败）

[[domain_routes]]
pattern = "x.com"
go_to = "vxtwitter"
skip_layers = ["jina"]
reason = "X/Twitter 公开 status 优先使用 vxTwitter/FixTweet JSON API，失败后再走通用抓取层"

[[domain_routes]]
pattern = "twitter.com"
go_to = "vxtwitter"
skip_layers = ["jina"]
reason = "Twitter 公开 status 优先使用 vxTwitter/FixTweet JSON API，失败后再走通用抓取层"

[[domain_routes]]
pattern = "youtube.com"
go_to = "youtube_ytdlp"
skip_layers = ["jina", "trafilatura", "scrapling", "webfetch"]
reason = "YouTube content is better extracted through yt-dlp metadata and subtitle APIs"

[[domain_routes]]
pattern = "youtu.be"
go_to = "youtube_ytdlp"
skip_layers = ["jina", "trafilatura", "scrapling", "webfetch"]
reason = "YouTube short URLs should use yt-dlp provider"

[[domain_routes]]
pattern = "github.com"
go_to = "github_gh"
skip_layers = []
reason = "GitHub structured data is available through gh CLI before webpage fallback"

[[domain_routes]]
pattern = "bilibili.com"
go_to = "bilibili_cli"
skip_layers = ["jina", "trafilatura", "scrapling", "webfetch", "youtube_ytdlp"]
reason = "Bilibili should use bili-cli or OpenCLI, not yt-dlp"

[[domain_routes]]
pattern = "v2ex.com"
go_to = "v2ex_api"
skip_layers = ["jina"]
reason = "V2EX public JSON APIs provide structured topic and reply data"

[[domain_routes]]
pattern = "reddit.com"
go_to = "opencli_reddit"
skip_layers = ["jina", "trafilatura", "scrapling", "webfetch"]
reason = "Reddit requires user-visible login for reliable reading"

[[domain_routes]]
pattern = "xhslink.com"
go_to = "opencli_xhs"
skip_layers = ["jina", "trafilatura", "scrapling", "webfetch"]
reason = "XiaoHongShu short links require session-aware providers"

[[domain_routes]]
pattern = "linkedin.com"
go_to = "linkedin_mcp"
skip_layers = []
reason = "LinkedIn public pages may fallback to Jina, full profile/job data needs MCP"

[[domain_routes]]
pattern = "xueqiu.com"
go_to = "xueqiu_api"
skip_layers = ["jina", "trafilatura", "scrapling", "webfetch"]
reason = "Xueqiu structured data is available through session-aware APIs"

[[domain_routes]]
pattern = "xiaoyuzhoufm.com"
go_to = "xiaoyuzhou_transcript"
skip_layers = ["jina", "trafilatura", "scrapling", "webfetch"]
reason = "Podcast value comes from audio transcript extraction"

[[domain_routes]]
pattern = "mp.weixin.qq.com"
go_to = "scrapling"
skip_layers = ["jina"]
reason = "微信公开正文适合使用专用正文选择器读取"

[[domain_routes]]
pattern = "xiaohongshu.com"
go_to = "opencli_xhs"
skip_layers = ["jina", "scrapling", "webfetch"]
reason = "小红书内容通常需要用户本人浏览器可见后读取"

[[domain_routes]]
pattern = "weibo.com"
go_to = "scrapling"
skip_layers = ["jina"]
reason = "公开页面结构变化较多，先用正文抽取层，必要时读取用户可见页面"

[[domain_routes]]
pattern = "zhihu.com"
go_to = "scrapling"
skip_layers = ["jina"]
reason = "页面结构变化较多，Scrapling 对公开正文抽取更稳定"

# ── 域名路由模板 ──────────────────────────────────────
# 采集新域名遇到问题时，复制此模板添加新路由：
#
# [[domain_routes]]
# pattern = "example.com"          # 域名匹配（支持子域名）
# go_to = "scrapling"              # 直接使用的方案 id
# skip_layers = ["jina"]           # 跳过的层
# reason = "简要说明原因"

# ── 正文选择器（Scrapling 专用）────────────────────────
# 按优先级尝试 CSS 选择器定位正文容器

[scrapling]
# 通用选择器（按优先级排列）
selectors = [
    "article",
    "main",
    ".post-content",
    ".article-content",
    ".entry-content",
    "[class*='body']",
    "#content",
    ".content",
]

# 特定域名的选择器覆盖
[scrapling.domain_selectors]
"mp.weixin.qq.com" = ["#js_content"]
"zhihu.com" = [".Post-RichText", ".RichText"]
"juejin.cn" = [".markdown-body", ".article-content"]
"medium.com" = ["article"]
"substack.com" = [".body.markup"]

# ── html2text 配置 ─────────────────────────────────────

[html2text]
ignore_links = false
ignore_images = false
body_width = 0           # 不自动折行
skip_internal_links = true
inline_links = true
